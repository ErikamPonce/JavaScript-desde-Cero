<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Pedidos</title>

    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            margin:40px;
            background:#f4f4f4;
        }

        h1{
            color:#6b3f1d;
        }

        button{
            padding:10px 20px;
            font-size:16px;
            cursor:pointer;
            background:#8B4513;
            color:white;
            border:none;
            border-radius:5px;
        }

        ul{
            margin-top:20px;
            padding:0;
        }

        li{
            list-style:none;
            padding:12px;
            margin:8px 0;
            background:white;
            border-radius:5px;
            box-shadow:0 2px 5px rgba(0,0,0,.2);
        }
    </style>
</head>
<body>

    <h1>Cafetería: Simulador de Pedidos</h1>

    <button id="addOrderBtn">Agregar Pedido</button>

    <ul id="orderList"></ul>

    <script src="app.js"></script>

</body>
</html>
