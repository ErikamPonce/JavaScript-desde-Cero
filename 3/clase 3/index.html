<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consumo de API</title>

    <style>

        body{
            font-family: Arial, Helvetica, sans-serif;
            text-align:center;
            background:#f4f4f4;
        }

        button{
            padding:10px 20px;
            margin:10px;
            cursor:pointer;
            font-size:16px;
        }

        #data-container{
            display:flex;
            flex-wrap:wrap;
            justify-content:center;
            gap:20px;
            margin-top:20px;
        }

        .card{
            width:200px;
            background:white;
            border-radius:10px;
            box-shadow:0 2px 5px rgba(0,0,0,.3);
            padding:15px;
        }

        .card img{
            width:100%;
            border-radius:10px;
        }

    </style>

</head>
<body>

<h1>Personajes de Rick & Morty</h1>

<button id="fetchBtn">Obtener con Fetch</button>

<button id="axiosBtn">Obtener con Axios</button>

<div id="data-container"></div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<script src="app.js"></script>

</body>
</html>
