<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Adivina el Número</title>

</head>

<body>

    <h1>Adivina el Número</h1>

    <p>La computadora generó un número entre 1 y 100.</p>

    <input
        type="number"
        id="numero"
        placeholder="Ingresa un número"
    >

    <button id="adivinar">
        Adivinar
    </button>

    <button id="reiniciar">
        Reiniciar
    </button>

    <p id="mensaje"></p>

    <p id="intentos">
        Intentos: 0
    </p>

    <script type="module" src="/src/main.js"></script>

</body>

</html>
