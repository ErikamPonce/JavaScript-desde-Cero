<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Generador de Contraseñas</title>

  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div class="container">

    <h1>Generador de Contraseñas Michi 🐈</h1>

    
    <div class="password-box">

      <input
        type="text"
        id="password"
        readonly
      >

      <button
        class="copy-btn"
        onclick="copyPassword()"
      >
        📋Copiar
      </button>

    </div>

    <!-- Settings -->
    <div class="settings">

      <div class="range-box">

        <div class="range-header">
          <label>Seleccione la cantidad de caracteres para su contraseña</label>
          <span id="length-value">12</span>
        </div>

        <input
          type="range"
          id="length"
          min="8"
          max="32"
          value="12"
        >

      </div>

      <!-- Checkboxes -->
      <div class="setting">
        <input type="checkbox" id="uppercase" checked>
        <label for="uppercase">
          Incluir letras mayúsculas
        </label>
      </div>

      <div class="setting">
        <input type="checkbox" id="lowercase" checked>
        <label for="lowercase">
          Incluir letras minúsculas
        </label>
      </div>

      <div class="setting">
        <input type="checkbox" id="numbers" checked>
        <label for="numbers">
          Incluir números
        </label>
      </div>

      <div class="setting">
        <input type="checkbox" id="symbols" checked>
        <label for="symbols">
          Incluir caracteres especiales
        </label>
      </div>

      <!-- Strength -->

      <div class="strength">

        <span>La contraseña es:</span>

        <div class="strength-right">

          <span id="strength-text">
            MEDIUM
          </span>

          <div class="bars">

            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>

          </div>

        </div>

      </div>

      <!-- Button -->

      <button
        class="generate-btn"
        onclick="generatePassword()"
      >
        Generar contraseña
      </button>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
